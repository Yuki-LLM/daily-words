name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build app files
        run: npm run build

      - name: Create Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Prepare Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          chmod +x ./gradlew
        working-directory: android

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee ../gradle-build.log
        working-directory: android

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Gradle-Build-Log
          path: gradle-build.log

      - name: Print Gradle failure summary
        if: failure()
        run: |
          grep -n -E "FAILURE:|What went wrong|Execution failed|Caused by:|Exception|error:" gradle-build.log > gradle-error-summary.txt || true
          {
            echo "### Gradle build failed"
            echo
            echo "Important lines:"
            echo
            echo '```text'
            cat gradle-error-summary.txt
            echo '```'
            echo
            echo "Tail:"
            echo
            echo '```text'
            tail -n 80 gradle-build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          summary="$(cat gradle-error-summary.txt | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
          if [ -z "$summary" ]; then
            summary="$(tail -n 80 gradle-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
          fi
          echo "::error title=Gradle build failed::$summary"

      - name: Rename APK
        if: success()
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Daily-Words.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Words-APK
          path: Daily-Words.apk

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: apk-${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" Daily-Words.apk \
            --title "Daily Words APK $TAG_NAME" \
            --notes "Install this APK on Android. If your phone asks, allow installation from this source."
